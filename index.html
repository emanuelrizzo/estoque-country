<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Country</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rye&family=Libre+Franklin:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --ink:#241812;
    --leather:#6B4226;
    --leather-light:#8B5E3C;
    --leather-dark:#4A2E18;
    --wheat:#E8D9B5;
    --bone:#FAF3E4;
    --rust:#A13D2C;
    --rust-dark:#832F21;
    --moss:#4A5D3A;
    --moss-light:#6B8256;
    --line: rgba(36,24,18,0.14);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:'Libre Franklin', sans-serif;
    color:var(--ink);
    background-color:var(--wheat);
    background-image:
      repeating-linear-gradient(115deg, rgba(107,66,38,0.035) 0px, rgba(107,66,38,0.035) 1px, transparent 1px, transparent 42px),
      repeating-linear-gradient(25deg, rgba(74,46,24,0.03) 0px, rgba(74,46,24,0.03) 1px, transparent 1px, transparent 58px);
    min-height:100vh;
    padding: 28px 20px 60px;
  }
  .wrap{ max-width: 1240px; margin:0 auto; }
  /* ---------- HEADER ---------- */
  .header{ display:flex; align-items:center; gap:18px; }
  .brand-mark{ flex-shrink:0; width:64px; height:64px; }
  .brand-text{ flex:1; min-width:0; }
  .store-name{
    font-family:'Rye', serif;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--leather-dark);
    line-height:1.1;
    margin:0;
    outline:none;
    cursor:text;
    border-bottom: 2px dashed transparent;
    display:inline-block;
    max-width:100%;
  }
  .store-name:hover, .store-name:focus{ border-bottom-color: var(--rust); }
  .store-name:empty:before{ content: attr(data-placeholder); color: var(--leather-light); opacity:.6; }
  .tagline{ margin:4px 0 0; font-size:14px; letter-spacing:.06em; text-transform:uppercase; color:var(--leather); font-weight:600; }
  .edit-hint{ font-size:11px; color:var(--leather-light); margin-top:2px; }
  /* ---------- ROPE DIVIDER ---------- */
  .rope{
    height:10px;
    margin: 22px 0 26px;
    border-radius:6px;
    background: repeating-linear-gradient(48deg, var(--leather-light) 0 6px, var(--leather-dark) 6px 12px);
    box-shadow: 0 2px 0 rgba(36,24,18,0.25), inset 0 1px 1px rgba(255,255,255,.25);
  }
  /* ---------- STAT TAGS ---------- */
  .stats{ display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; margin-bottom:28px; }
  @media (max-width: 1024px){ .stats{ grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px){ .stats{ grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px){ .stats{ grid-template-columns: 1fr; } }
  .tag{
    position:relative;
    background: var(--bone);
    border: 1px solid var(--line);
    padding: 16px 18px 16px 22px;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%);
    box-shadow: 3px 3px 0 rgba(36,24,18,0.08);
    cursor:pointer;
    transition: transform .15s ease;
  }
  .tag:hover{ transform: translateY(-2px); }
  .tag:before{
    content:'';
    position:absolute; left:9px; top:50%; transform:translateY(-50%);
    width:7px; height:7px; border-radius:50%;
    background: var(--wheat);
    box-shadow: 0 0 0 2px var(--leather-light);
  }
  .tag .num{ font-family:'JetBrains Mono', monospace; font-weight:700; font-size:20px; color:var(--leather-dark); display:block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--leather); font-weight:600; }
  .tag.active{ background: var(--rust); }
  .tag.active .num, .tag.active .lbl{ color: var(--bone); }
  .tag.low .num{ color: var(--rust); }
  .tag.profit .num{ color: var(--moss); }
  /* ---------- TOOLBAR ---------- */
  .toolbar{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background: var(--leather-dark);
    padding:12px 16px;
    border-radius:8px;
    margin-bottom: 18px;
  }
  .toolbar input[type="text"], .toolbar select{
    font-family:'Libre Franklin', sans-serif;
    font-size:14px;
    padding:9px 12px;
    border-radius:5px;
    border:1px solid var(--leather);
    background: var(--bone);
    color: var(--ink);
  }
  .toolbar input[type="text"]{ flex:1; min-width:160px; }
  .toolbar .spacer{ flex:1; }
  .btn{
    font-family:'Libre Franklin', sans-serif;
    font-weight:700;
    font-size:14px;
    padding:10px 18px;
    border-radius:5px;
    border:none;
    cursor:pointer;
    transition: filter .15s ease;
  }
  .btn:hover{ filter:brightness(1.08); }
  .btn-primary{ background: var(--rust); color: var(--bone); }
  .btn-ghost{ background: transparent; color: var(--bone); border:1px solid rgba(250,243,228,.4); }
  .btn-secondary{ background: var(--wheat); color:var(--ink); }
  .btn-icon{ background:transparent; border:none; cursor:pointer; font-size:16px; padding:4px 6px; border-radius:4px; }
  .btn-icon:hover{ background: rgba(36,24,18,0.08); }
  /* ---------- TABLE ---------- */
  .table-wrap{
    background: var(--bone);
    border-radius: 8px;
    border: 1px solid var(--line);
    overflow:hidden;
  }
  table{ width:100%; border-collapse: collapse; }
  thead th{
    text-align:left;
    font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color: var(--bone);
    background: var(--leather);
    padding: 12px 14px;
    font-weight:700;
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
  }
  thead th:hover{ background: var(--leather-light); }
  tbody tr{ border-bottom:1px solid var(--line); }
  tbody tr:last-child{ border-bottom:none; }
  tbody tr:hover{ background: rgba(107,66,38,0.05); }
  tbody tr.low-stock{ box-shadow: inset 4px 0 0 var(--rust); }
  td{ padding: 12px 14px; font-size:14px; vertical-align:middle; }
  .cell-name{ font-weight:700; color:var(--leather-dark); }
  .cell-sub{ font-size:12px; color:var(--leather-light); font-family:'JetBrains Mono',monospace; }
  .cat-chip{
    display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px;
    background: var(--wheat); color: var(--leather-dark); font-weight:600;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  .low-flag{
    display:inline-block; margin-left:8px; font-size:10px; padding:2px 7px; border-radius:20px;
    background: var(--rust); color:var(--bone); font-weight:700; text-transform:uppercase; letter-spacing:.03em;
  }
  .qty-stepper{ display:flex; align-items:center; gap:6px; }
  .qty-stepper button{
    width:24px; height:24px; border-radius:4px; border:1px solid var(--line);
    background: var(--wheat); cursor:pointer; font-weight:700; line-height:1;
    font-family:'Libre Franklin', sans-serif;
  }
  .qty-stepper button:hover{ background: var(--leather-light); color:var(--bone); }
  .qty-stepper .qty-val{ min-width:28px; text-align:center; font-family:'JetBrains Mono',monospace; font-weight:700; }
  .actions-cell{ display:flex; gap:4px; white-space:nowrap; }
  /* ---------- EMPTY STATE ---------- */
  .empty-state{ text-align:center; padding: 60px 20px; }
  .empty-state svg{ width:90px; height:90px; margin-bottom: 14px; opacity:.75; }
  .empty-state h3{ font-family:'Rye', serif; color:var(--leather-dark); font-size:22px; margin:0 0 6px; }
  .empty-state p{ color:var(--leather); margin:0 0 18px; font-size:14px; }
  .loading{ text-align:center; padding:60px 20px; color:var(--leather); font-size:14px; }
  /* ---------- MOBILE CARD LIST ---------- */
  .card-list{ display:none; flex-direction:column; gap:12px; }
  .item-card{
    background:var(--bone); border:1px solid var(--line); border-radius:8px; padding:14px;
    box-shadow: 2px 2px 0 rgba(36,24,18,0.06);
  }
  .item-card.low-stock{ box-shadow: inset 4px 0 0 var(--rust), 2px 2px 0 rgba(36,24,18,0.06); }
  .item-card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px;}
  .item-card-row{ display:flex; justify-content:space-between; font-size:13px; padding:3px 0; color:var(--leather-dark); }
  .item-card-row span:first-child{ color:var(--leather-light); }
  @media (max-width: 760px){
    .table-wrap{ display:none; }
    .card-list{ display:flex; }
  }
  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background: rgba(36,24,18,0.55);
    display:flex; align-items:flex-start; justify-content:center;
    padding: 40px 16px; overflow-y:auto; z-index:100;
  }
  .hidden{ display:none !important; }
  .modal{
    background: var(--bone);
    max-width: 520px; width:100%;
    border-radius:10px;
    padding: 28px 28px 24px;
    position:relative;
    border: 2px dashed var(--leather-light);
  }
  .modal h2{ font-family:'Rye', serif; color:var(--leather-dark); font-size:24px; margin:0 0 18px; }
  .modal-close{ position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--leather); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--leather); margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border-radius:5px; border:1px solid var(--line);
    font-family:'Libre Franklin', sans-serif; font-size:14px; background:#fff;
  }
  .field input.invalid{ border-color: var(--rust); }
  .field-error{ font-size:11px; color:var(--rust); margin-top:3px; display:none; }
  .field-error.show{ display:block; }
  .field-row{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  .confirm-modal{ max-width: 380px; text-align:center; }
  .confirm-modal p{ font-size:14px; color:var(--ink); margin: 0 0 20px; }
  .footer-note{ text-align:center; font-size:12px; color:var(--leather); margin-top:26px; opacity:.75; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <svg class="brand-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" fill="none" stroke="#6B4226" stroke-width="2.5"/>
      <circle cx="32" cy="32" r="24" fill="none" stroke="#6B4226" stroke-width="1.2" stroke-dasharray="2 3"/>
      <text x="32" y="40" font-family="Rye, serif" font-size="24" fill="#6B4226" text-anchor="middle">E</text>
    </svg>
    <div class="brand-text">
      <h1 class="store-name" id="storeName" contenteditable="true" data-placeholder="Nome da sua empresa"></h1>
      <div class="tagline">Controle de estoque</div>
      <div class="edit-hint">clique no nome para editar</div>
    </div>
  </div>
  <div class="rope"></div>
  <div id="statsRow" class="stats"></div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Buscar por nome ou código...">
    <select id="categoryFilter"></select>
    <select id="sortSelect">
      <option value="name-asc">Nome (A-Z)</option>
      <option value="name-desc">Nome (Z-A)</option>
      <option value="qty-asc">Menor estoque</option>
      <option value="qty-desc">Maior estoque</option>
      <option value="value-desc">Maior valor de venda</option>
      <option value="value-asc">Menor valor de venda</option>
    </select>
    <div class="spacer"></div>
    <button class="btn btn-ghost" id="exportBtn">Exportar CSV</button>
    <button class="btn btn-primary" id="addBtn">+ Novo item</button>
  </div>
  <div id="content">
    <div class="loading">Carregando estoque...</div>
  </div>
  <div class="footer-note">Os dados ficam salvos automaticamente na sua conta local.</div>
</div>

<!-- ITEM MODAL -->
<div class="overlay hidden" id="itemOverlay">
  <div class="modal">
    <button class="modal-close" id="closeItemModal">&times;</button>
    <h2 id="modalTitle">Novo item</h2>
    <form id="itemForm">
      <div class="field">
        <label>Nome do produto *</label>
        <input type="text" id="f-name" placeholder="Ex: Bota Texana Couro">
        <div class="field-error" id="err-name">Informe o nome do produto.</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Categoria *</label>
          <input type="text" id="f-category" list="categoryOptions" placeholder="Ex: Botas">
          <datalist id="categoryOptions"></datalist>
          <div class="field-error" id="err-category">Informe a categoria.</div>
        </div>
        <div class="field">
          <label>Código / SKU</label>
          <input type="text" id="f-sku" placeholder="Opcional">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Quantidade *</label>
          <input type="number" id="f-qty" min="0" step="1" placeholder="0">
          <div class="field-error" id="err-qty">Informe uma quantidade válida.</div>
        </div>
        <div class="field">
          <label>Estoque mínimo</label>
          <input type="number" id="f-minstock" min="0" step="1" placeholder="5">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Preço de Custo (R$) *</label>
          <input type="number" id="f-cost-price" min="0" step="0.01" placeholder="0,00">
          <div class="field-error" id="err-cost-price">Informe o preço de custo.</div>
        </div>
        <div class="field">
          <label>Preço de Venda (R$) *</label>
          <input type="number" id="f-price" min="0" step="0.01" placeholder="0,00">
          <div class="field-error" id="err-price">Informe o preço de venda.</div>
        </div>
      </div>
      <div class="field">
        <label>Fornecedor</label>
        <input type="text" id="f-supplier" placeholder="Opcional">
      </div>
      <div class="field">
        <label>Observaçőes</label>
        <textarea id="f-notes" rows="2" placeholder="Opcional"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelItemBtn">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay hidden" id="confirmOverlay">
  <div class="modal confirm-modal">
    <h2 id="confirmTitle">Confirmar</h2>
    <p id="confirmMessage">Tem certeza?</p>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn btn-secondary" id="confirmCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="confirmOkBtn">Confirmar</button>
    </div>
  </div>
</div>

<script>
(function(){
  // Novas categorias adicionadas aqui conforme solicitado
  const DEFAULT_CATEGORIES = ['Botas','Chapéus','Camisetas','Camisetas Infantil','Cintos','Camisas','Calças Jeans','Jaquetas','Esporas','Bonés','Acessórios','Outros'];
  let products = [];
  let config = { storeName: '' };
  let filterText = '';
  let filterCategory = 'all';
  let sortBy = 'name-asc';
  let showLowOnly = false;
  let editingId = null;
  let deleteTargetId = null;
  let saveTimer = null;

  const el = (id) => document.getElementById(id);
  const fmtMoney = (n) => (Number(n)||0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

  function uid(){
    return 'p-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
  }

  async function loadProducts(){
    try{
      const res = localStorage.getItem('produtos');
      if(res){ return JSON.parse(res); }
      return [];
    }catch(e){ return []; }
  }

  async function loadConfig(){
    try{
      const res = localStorage.getItem('config');
      if(res){ return JSON.parse(res); }
      return { storeName: '' };
    }catch(e){ return { storeName: '' }; }
  }

  function scheduleSaveProducts(){
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try{
        localStorage.setItem('produtos', JSON.stringify(products));
      }catch(e){ console.error('Falha ao salvar estoque', e); }
    }, 350);
  }

  async function saveConfig(){
    try{
      localStorage.setItem('config', JSON.stringify(config));
    }catch(e){ console.error('Falha ao salvar configuraçăo', e); }
  }

  function getCategories(){
    const set = new Set(products.map(p => p.category).filter(Boolean));
    return Array.from(set).sort((a,b)=>a.localeCompare(b, 'pt-BR'));
  }

  function isLow(p){
    return Number(p.qty) <= Number(p.minStock ?? 0);
  }

  function getFiltered(){
    let list = products.slice();
    if(filterText.trim()){
      const q = filterText.trim().toLowerCase();
      list = list.filter(p => (p.name||'').toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q));
    }
    if(filterCategory !== 'all'){
      list = list.filter(p => p.category === filterCategory);
    }
    if(showLowOnly){
      list = list.filter(isLow);
    }
    list.sort((a,b) => {
      switch(sortBy){
        case 'name-asc': return (a.name||'').localeCompare(b.name||'', 'pt-BR');
        case 'name-desc': return (b.name||'').localeCompare(a.name||'', 'pt-BR');
        case 'qty-asc': return Number(a.qty) - Number(b.qty);
        case 'qty-desc': return Number(b.qty) - Number(a.qty);
        case 'value-asc': return (Number(a.qty)*Number(a.price)) - (Number(b.qty)*Number(b.price));
        case 'value-desc': return (Number(b.qty)*Number(b.price)) - (Number(a.qty)*Number(a.price));
        default: return 0;
      }
    });
    return list;
  }

  // ---------- RENDER STATS (Com o Lucro Estimado incluído) ----------
  function renderStats(){
    const totalItems = products.length;
    const totalUnits = products.reduce((s,p) => s + Number(p.qty||0), 0);
    const totalValue = products.reduce((s,p) => s + Number(p.qty||0)*Number(p.price||0), 0);
    const lowCount = products.filter(isLow).length;
    
    // Cálculo do lucro: (Preço de Venda - Preço de Custo) * Qtd
    const totalProfit = products.reduce((s,p) => {
      const cost = Number(p.costPrice || 0);
      const sale = Number(p.price || 0);
      return s + (Number(p.qty || 0) * (sale - cost));
    }, 0);

    el('statsRow').innerHTML = `
      <div class="tag" data-stat="all">
        <span class="num">${totalItems}</span>
        <span class="lbl">Produtos</span>
      </div>
      <div class="tag" data-stat="units">
        <span class="num">${totalUnits}</span>
        <span class="lbl">Total Itens</span>
      </div>
      <div class="tag" data-stat="value">
        <span class="num">${fmtMoney(totalValue)}</span>
        <span class="lbl">Valor em Venda</span>
      </div>
      <div class="tag profit" data-stat="profit">
        <span class="num">${fmtMoney(totalProfit)}</span>
        <span class="lbl">Lucro Estimado</span>
      </div>
      <div class="tag low ${showLowOnly ? 'active' : ''}" data-stat="low">
        <span class="num">${lowCount}</span>
        <span class="lbl">Estoque baixo</span>
      </div>
    `;
    el('statsRow').querySelector('[data-stat="low"]').addEventListener('click', () => {
      showLowOnly = !showLowOnly;
      renderAll();
    });
  }

  function renderCategoryFilter(){
    const cats = getCategories();
    const select = el('categoryFilter');
    const current = filterCategory;
    select.innerHTML = `<option value="all">Todas as categorias</option>` +
      cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    select.value = cats.includes(current) ? current : 'all';
    filterCategory = select.value;
  }

  function renderCategoryDatalist(){
    const cats = Array.from(new Set([...DEFAULT_CATEGORIES, ...getCategories()]));
    el('categoryOptions').innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">`).join('');
  }

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function emptyStateHtml(hasAnyProduct){
    if(hasAnyProduct){
      return `
        <div class="empty-state">
          <svg viewBox="0 0 100 100" fill="none" stroke="#6B4226" stroke-width="2.5"><rect x="15" y="35" width="70" height="45" rx="3"/><path d="M15 35 L50 15 L85 35"/><line x1="50" y1="15" x2="50" y2="80"/></svg>
          <h3>Nenhum item encontrado</h3>
          <p>Tente ajustar a busca ou os filtros.</p>
        </div>`;
    }
    return `
      <div class="empty-state">
        <svg viewBox="0 0 100 100" fill="none" stroke="#6B4226" stroke-width="2.5"><rect x="15" y="35" width="70" height="45" rx="3"/><path d="M15 35 L50 15 L85 35"/><line x1="50" y1="15" x2="50" y2="80"/></svg>
        <h3>O curral está vazio</h3>
        <p>Cadastre o primeiro item do seu estoque para começar.</p>
        <button class="btn btn-primary" id="emptyAddBtn">+ Adicionar item</button>
      </div>`;
  }

  function renderList(){
    const list = getFiltered();
    const content = el('content');
    if(products.length === 0){
      content.innerHTML = emptyStateHtml(false);
      el('emptyAddBtn')?.addEventListener('click', openAddModal);
      return;
    }
    if(list.length === 0){
      content.innerHTML = emptyStateHtml(true);
      return;
    }
    
    const rows = list.map(p => {
      const low = isLow(p);
      const value = Number(p.qty||0) * Number(p.price||0);
      const itemProfit = (Number(p.price || 0) - Number(p.costPrice || 0)) * Number(p.qty || 0);
      return `
      <tr class="${low ? 'low-stock' : ''}" data-id="${p.id}">
        <td>
          <div class="cell-name">${escapeHtml(p.name)}${low ? '<span class="low-flag">Baixo</span>' : ''}</div>
          ${p.supplier ? `<div class="cell-sub">${escapeHtml(p.supplier)}</div>` : ''}
        </td>
        <td><span class="cat-chip">${escapeHtml(p.category)}</span></td>
        <td class="cell-sub">${escapeHtml(p.sku || ' ')}</td>
        <td>
          <div class="qty-stepper">
            <button type="button" data-action="dec" data-id="${p.id}">-</button>
            <span class="qty-val">${p.qty}</span>
            <button type="button" data-action="inc" data-id="${p.id}">+</button>
          </div>
        </td>
        <td class="mono" title="Custo: ${fmtMoney(p.costPrice)}">${fmtMoney(p.price)}</td>
        <td class="mono">${fmtMoney(value)}</td>
        <td class="mono" style="color: var(--moss); font-weight: 600;">${fmtMoney(itemProfit)}</td>
        <td class="actions-cell">
          <button class="btn-icon" title="Editar" data-action="edit" data-id="${p.id}">??</button>
          <button class="btn-icon" title="Excluir" data-action="delete" data-id="${p.id}">???</button>
        </td>
      </tr>`;
    }).join('');

    const cards = list.map(p => {
      const low = isLow(p);
      const value = Number(p.qty||0) * Number(p.price||0);
      const itemProfit = (Number(p.price || 0) - Number(p.costPrice || 0)) * Number(p.qty || 0);
      return `
      <div class="item-card ${low ? 'low-stock' : ''}" data-id="${p.id}">
        <div class="item-card-top">
          <div>
            <div class="cell-name">${escapeHtml(p.name)}${low ? '<span class="low-flag">Baixo</span>' : ''}</div>
            <span class="cat-chip">${escapeHtml(p.category)}</span>
          </div>
          <div class="actions-cell">
            <button class="btn-icon" data-action="edit" data-id="${p.id}">??</button>
            <button class="btn-icon" data-action="delete" data-id="${p.id}">???</button>
          </div>
        </div>
        <div class="item-card-row"><span>Código</span><span class="mono">${escapeHtml(p.sku || ' ')}</span></div>
        <div class="item-card-row"><span>Quantidade</span>
          <span class="qty-stepper">
            <button type="button" data-action="dec" data-id="${p.id}">-</button>
            <span class="qty-val">${p.qty}</span>
            <button type="button" data-action="inc" data-id="${p.id}">+</button>
          </span>
        </div>
        <div class="item-card-row"><span>Preço Custo</span><span class="mono">${fmtMoney(p.costPrice)}</span></div>
        <div class="item-card-row"><span>Preço Venda</span><span class="mono">${fmtMoney(p.price)}</span></div>
        <div class="item-card-row"><span>Valor Total</span><span class="mono">${fmtMoney(value)}</span></div>
        <div class="item-card-row"><span>Lucro Estimado</span><span class="mono" style="color: var(--moss); font-weight:600;">${fmtMoney(itemProfit)}</span></div>
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Código</th>
              <th>Qtd.</th>
              <th>Preço Venda</th>
              <th>Total Venda</th>
              <th>Lucro Itens</th>
              <th>Açőes</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="card-list">${cards}</div>
    `;

    content.querySelectorAll('[data-action]').forEach(btn => {
      const id = btn.getAttribute('data-id');
      const action = btn.getAttribute('data-action');
      btn.addEventListener('click', () => {
        if(action === 'inc') adjustQty(id, 1);
        else if(action === 'dec') adjustQty(id, -1);
        else if(action === 'edit') openEditModal(id);
        else if(action === 'delete') openDeleteConfirm(id);
      });
    });
  }

  function renderAll(){
    renderStats();
    renderCategoryFilter();
    renderCategoryDatalist();
    renderList();
  }

  function adjustQty(id, delta){
    const p = products.find(x => x.id === id);
    if(!p) return;
    p.qty = Math.max(0, Number(p.qty||0) + delta);
    scheduleSaveProducts();
    renderAll();
  }

  // ---------- MODAL: ADD/EDIT ----------
  function openAddModal(){
    editingId = null;
    el('modalTitle').textContent = 'Novo item';
    el('itemForm').reset();
    el('f-minstock').value = 5;
    clearErrors();
    el('itemOverlay').classList.remove('hidden');
    el('f-name').focus();
  }

  function openEditModal(id){
    const p = products.find(x => x.id === id);
    if(!p) return;
    editingId = id;
    el('modalTitle').textContent = 'Editar item';
    el('f-name').value = p.name || '';
    el('f-category').value = p.category || '';
    el('f-sku').value = p.sku || '';
    el('f-qty').value = p.qty ?? 0;
    el('f-cost-price').value = p.costPrice ?? 0;
    el('f-price').value = p.price ?? 0;
    el('f-minstock').value = p.minStock ?? 5;
    el('f-supplier').value = p.supplier || '';
    el('f-notes').value = p.notes || '';
    clearErrors();
    el('itemOverlay').classList.remove('hidden');
    el('f-name').focus();
  }

  function closeItemModal(){
    el('itemOverlay').classList.add('hidden');
    editingId = null;
  }

  function clearErrors(){
    ['name','category','qty','price','cost-price'].forEach(k => {
      el('f-'+k)?.classList.remove('invalid');
      el('err-'+k)?.classList.remove('show');
    });
  }

  function validateForm(){
    let valid = true;
    clearErrors();
    const name = el('f-name').value.trim();
    const category = el('f-category').value.trim();
    const qty = el('f-qty').value;
    const costPrice = el('f-cost-price').value;
    const price = el('f-price').value;

    if(!name){ el('f-name').classList.add('invalid'); el('err-name').classList.add('show'); valid = false; }
    if(!category){ el('f-category').classList.add('invalid'); el('err-category').classList.add('show'); valid = false; }
    if(qty === '' || Number(qty) < 0){ el('f-qty').classList.add('invalid'); el('err-qty').classList.add('show'); valid = false; }
    if(costPrice === '' || Number(costPrice) < 0){ el('f-cost-price').classList.add('invalid'); el('err-cost-price').classList.add('show'); valid = false; }
    if(price === '' || Number(price) < 0){ el('f-price').classList.add('invalid'); el('err-price').classList.add('show'); valid = false; }
    return valid;
  }

  function handleFormSubmit(e){
    e.preventDefault();
    if(!validateForm()) return;
    const data = {
      name: el('f-name').value.trim(),
      category: el('f-category').value.trim(),
      sku: el('f-sku').value.trim(),
      qty: Math.max(0, Math.round(Number(el('f-qty').value))),
      costPrice: Math.max(0, Number(el('f-cost-price').value)),
      price: Math.max(0, Number(el('f-price').value)),
      minStock: Math.max(0, Math.round(Number(el('f-minstock').value) || 0)),
      supplier: el('f-supplier').value.trim(),
      notes: el('f-notes').value.trim(),
    };
    if(editingId){
      const p = products.find(x => x.id === editingId);
      if(p) Object.assign(p, data);
    }else{
      products.push({ id: uid(), ...data });
    }
    scheduleSaveProducts();
    closeItemModal();
    renderAll();
  }

  // ---------- MODAL: CONFIRM DELETE ----------
  function openDeleteConfirm(id){
    const p = products.find(x => x.id === id);
    if(!p) return;
    deleteTargetId = id;
    el('confirmTitle').textContent = 'Excluir item';
    el('confirmMessage').textContent = `Tem certeza que deseja excluir "${p.name}"? Essa açăo năo pode ser desfeita.`;
    el('confirmOverlay').classList.remove('hidden');
  }

  function closeConfirm(){
    el('confirmOverlay').classList.add('hidden');
    deleteTargetId = null;
  }

  function handleConfirmOk(){
    if(deleteTargetId){
      products = products.filter(p => p.id !== deleteTargetId);
      scheduleSaveProducts();
    }
    closeConfirm();
    renderAll();
  }

  // ---------- CSV EXPORT ----------
  function exportCsv(){
    const header = ['Nome','Categoria','SKU','Quantidade','Preco Custo','Preco Venda','Valor Total Venda','Lucro Estimado','Estoque Minimo','Fornecedor','Observacoes'];
    const rows = products.map(p => {
      const saleValue = Number(p.qty)*Number(p.price);
      const profitValue = (Number(p.price) - Number(p.costPrice || 0)) * Number(p.qty);
      return [
        p.name, p.category, p.sku || '', p.qty, p.costPrice || 0, p.price, saleValue.toFixed(2), profitValue.toFixed(2), p.minStock ?? '', p.supplier || '', p.notes || ''
      ];
    });
    const csvLines = [header, ...rows].map(r =>
      r.map(field => {
        const s = String(field ?? '');
        return /[",;\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
      }).join(';')
    );
    const csvContent = '\uFEFF' + csvLines.join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'estoque.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------- INIT / EVENTS ----------
  el('addBtn').addEventListener('click', openAddModal);
  el('closeItemModal').addEventListener('click', closeItemModal);
  el('cancelItemBtn').addEventListener('click', closeItemModal);
  el('itemForm').addEventListener('submit', handleFormSubmit);
  el('itemOverlay').addEventListener('click', (e) => { if(e.target.id === 'itemOverlay') closeItemModal(); });
  el('confirmCancelBtn').addEventListener('click', closeConfirm);
  el('confirmOkBtn').addEventListener('click', handleConfirmOk);
  el('confirmOverlay').addEventListener('click', (e) => { if(e.target.id === 'confirmOverlay') closeConfirm(); });
  el('exportBtn').addEventListener('click', exportCsv);
  el('searchInput').addEventListener('input', (e) => { filterText = e.target.value; renderList(); });
  el('categoryFilter').addEventListener('change', (e) => { filterCategory = e.target.value; renderList(); });
  el('sortSelect').addEventListener('change', (e) => { sortBy = e.target.value; renderList(); });

  const storeNameEl = el('storeName');
  storeNameEl.addEventListener('blur', () => {
    config.storeName = storeNameEl.textContent.trim();
    saveConfig();
  });
  storeNameEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); storeNameEl.blur(); }
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape'){
      if(!el('itemOverlay').classList.contains('hidden')) closeItemModal();
      if(!el('confirmOverlay').classList.contains('hidden')) closeConfirm();
    }
  });

  async function init(){
    const [prodResult, cfgResult] = await Promise.all([loadProducts(), loadConfig()]);
    products = prodResult;
    config = cfgResult || { storeName: '' };
    storeNameEl.textContent = config.storeName || 'Estoque Country';
    renderAll();
  }

  init();
})();
</script>
</body>
</html>
